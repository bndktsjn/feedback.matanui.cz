services:
  api:
    build:
      context: ..
      dockerfile: infra/api.Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-feedback}:${POSTGRES_PASSWORD:-feedback}@postgres:5432/${POSTGRES_DB:-feedback}
      API_PORT: 3001
      NODE_ENV: development
      SESSION_SECRET: ${SESSION_SECRET:-dev-session-secret-change-me}
      S3_ENDPOINT: http://minio:9000
      S3_ACCESS_KEY: ${S3_ACCESS_KEY:-minioadmin}
      S3_SECRET_KEY: ${S3_SECRET_KEY:-minioadmin}
      S3_BUCKET: ${S3_BUCKET:-feedback-uploads}
      S3_REGION: ${S3_REGION:-us-east-1}
      CSRF_SECRET: ${CSRF_SECRET:-dev-csrf-secret-change-me}
    ports:
      - "3001:3001"

  web:
    build:
      context: ..
      dockerfile: infra/web.Dockerfile
    restart: unless-stopped
    depends_on:
      - api
    environment:
      API_HOST: api
      API_PORT: 3001
      NODE_ENV: development
    ports:
      - "3000:3000"

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    depends_on:
      - api
      - web
    ports:
      - "8080:8080"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro,z
