services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY}
    volumes:
      - miniodata:/data

  minio-init:
    image: minio/mc
    depends_on:
      - minio
    environment:
      MC_ACCESS: ${S3_ACCESS_KEY}
      MC_SECRET: ${S3_SECRET_KEY}
    entrypoint: >
      /bin/sh -c "
      sleep 3;
      mc alias set local http://minio:9000 $${MC_ACCESS} $${MC_SECRET};
      mc mb local/${S3_BUCKET:-feedback-uploads} --ignore-existing;
      exit 0;
      "

  api:
    build:
      context: ..
      dockerfile: infra/api.Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "127.0.0.1:3101:3001"
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      API_PORT: 3001
      NODE_ENV: production
      SESSION_SECRET: ${SESSION_SECRET}
      SESSION_MAX_AGE_MS: ${SESSION_MAX_AGE_MS:-86400000}
      S3_ENDPOINT: http://minio:9000
      S3_ACCESS_KEY: ${S3_ACCESS_KEY}
      S3_SECRET_KEY: ${S3_SECRET_KEY}
      S3_BUCKET: ${S3_BUCKET}
      S3_REGION: ${S3_REGION:-us-east-1}
      CSRF_SECRET: ${CSRF_SECRET}
      APP_URL: ${APP_URL:-https://feedback.matanui.cz}

  web:
    build:
      context: ..
      dockerfile: infra/web.Dockerfile
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "127.0.0.1:3100:3000"
    environment:
      NODE_ENV: production
      API_PORT: 3001
      API_HOST: api

volumes:
  pgdata:
  miniodata:
